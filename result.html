<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Results | PM SHRI SCHOOL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
    padding-bottom:100px;
}



/* BACKGROUND LIGHTS */

.bg-light{
    position:fixed;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#0077ff55,transparent 70%);
    top:-150px;
    left:-100px;
    filter:blur(60px);
    z-index:-2;
}

.bg-light2{
    position:fixed;
    width:450px;
    height:450px;
    background:radial-gradient(circle,#ff880044,transparent 70%);
    bottom:-180px;
    right:-120px;
    filter:blur(70px);
    z-index:-2;
}



/* FLOATING LINES */

.lines{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.lines span{
    position:absolute;
    width:2px;
    height:120px;
    background:linear-gradient(transparent,#00aaff,transparent);
    animation:move 8s linear infinite;
    opacity:.4;
}

.lines span:nth-child(1){
    left:10%;
    animation-delay:0s;
}

.lines span:nth-child(2){
    left:25%;
    animation-delay:2s;
}

.lines span:nth-child(3){
    left:45%;
    animation-delay:4s;
}

.lines span:nth-child(4){
    left:65%;
    animation-delay:1s;
}

.lines span:nth-child(5){
    left:85%;
    animation-delay:3s;
}



/* MAIN SECTION */

.result-section{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}



/* BOX */

.result-box{
    position:relative;
    width:100%;
    max-width:650px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:35px;

    padding:65px 40px;

    text-align:center;

    overflow:hidden;

    box-shadow:
    0 0 25px rgba(0,140,255,0.35),
    0 0 60px rgba(255,140,0,0.18);
}



/* TOP GLOW */

.top-glow{
    position:absolute;
    top:-100px;
    left:50%;
    transform:translateX(-50%);
    width:220px;
    height:220px;
    background:radial-gradient(circle,#008cff55,transparent 70%);
    filter:blur(20px);
}



/* ICON CIRCLE */

.icon-circle{
    width:130px;
    height:130px;

    background:
    linear-gradient(135deg,#008cff,#ff8800);

    border-radius:50%;

    margin:auto;
    margin-bottom:35px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:50px;

    animation:pulse 2.2s infinite;

    box-shadow:
    0 0 30px #008cff,
    0 0 60px #ff8800;
}



/* TEXT */

.result-box h1{
    font-size:54px;
    margin-bottom:18px;
    letter-spacing:2px;

    text-shadow:
    0 0 10px #008cff,
    0 0 25px #008cff;
}

.result-box p{
    color:#d7d7d7;
    margin-bottom:40px;
    font-size:17px;
    line-height:1.8;
}



/* RESULT BUTTON */

.result-btn{
    display:inline-flex;
    align-items:center;
    gap:12px;

    padding:18px 38px;

    border-radius:18px;

    background:linear-gradient(135deg,#008cff,#005eff);

    color:white;
    text-decoration:none;

    font-size:18px;
    font-weight:600;

    transition:.35s;

    box-shadow:
    0 10px 25px rgba(0,140,255,.35);
}

.result-btn:hover{
    transform:translateY(-5px) scale(1.03);

    box-shadow:
    0 15px 35px rgba(0,140,255,.45);
}



/* LOADING BAR */

.loading-bar{
    width:100%;
    height:12px;

    background:rgba(255,255,255,0.08);

    border-radius:20px;

    overflow:hidden;

    margin-top:40px;
    margin-bottom:18px;
}

.loading{
    width:40%;
    height:100%;

    background:
    linear-gradient(90deg,#008cff,#ff8800);

    border-radius:20px;

    animation:loading 2s infinite;
}



/* WAIT TEXT */

.wait{
    font-size:15px;
    color:#bbb;
    letter-spacing:1px;
}



/* BOTTOM NAVIGATION */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;

    width:100%;
    height:80px;

    background:rgba(8,17,31,0.95);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:space-around;
    align-items:center;

    border-top:1px solid rgba(255,255,255,0.08);

    z-index:999999;
}



/* NAV ITEMS */

.nav-item{
    text-decoration:none;
    color:#ccc;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    transition:.3s;
}

.nav-item span{
    font-size:24px;
    margin-bottom:4px;
}

.nav-item p{
    font-size:13px;
}

.nav-item:hover{
    color:#00aaff;
    transform:translateY(-5px);
}

.active{
    color:#ff9900;
}



/* ANIMATIONS */

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.1);
    }

    100%{
        transform:scale(1);
    }

}

@keyframes loading{

    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(300%);
    }

}

@keyframes move{

    0%{
        top:-150px;
    }

    100%{
        top:120%;
    }

}



/* RESPONSIVE */

@media(max-width:600px){

    .result-box{
        padding:50px 25px;
    }

    .result-box h1{
        font-size:38px;
    }

    .icon-circle{
        width:100px;
        height:100px;
        font-size:38px;
    }

    .result-btn{
        width:100%;
        justify-content:center;
    }

}

</style>

</head>

<body>



<!-- BACKGROUND -->

<div class="bg-light"></div>
<div class="bg-light2"></div>



<!-- FLOATING LINES -->

<div class="lines">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>



<!-- MAIN SECTION -->

<section class="result-section">

    <div class="result-box">

        <div class="top-glow"></div>

        <div class="icon-circle">
            📘
        </div>

        <h1>RESULTS</h1>

        <p>
            PM SHRI GOVERNMENT HIGHER SECONDARY SCHOOL CHORAHATA
        </p>



        <!-- RESULT BUTTON -->

        <a 
        href="https://script.google.com/macros/s/AKfycbyxQwHw2aEj2mg-S-uMfQfctTJaqYf6yQuITpcQkhSP0MBw87r8h7IMd8i3m6jqswt5/exec" 
        class="result-btn"
        target="_blank">

            📄 Check Results

        </a>



        <!-- LOADING -->

        <div class="loading-bar">
            <div class="loading"></div>
        </div>

        <div class="wait">
            Official Result Portal
        </div>

    </div>

</section>



<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

    <a href="index.html" class="nav-item">
        <span>🏠</span>
        <p>Home</p>
    </a>

    <a href="result.html" class="nav-item active">
        <span>📘</span>
        <p>Results</p>
    </a>

    <a href="notice.html" class="nav-item">
        <span>📢</span>
        <p>Notice</p>
    </a>

    <a href="achivements.html" class="nav-item">
        <span>🏆</span>
        <p>Achievements</p>
    </a>

</div>



</body>
</html>
