<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Results | PM SHRI SCHOOL</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
    padding-bottom:100px;
}



/* BACKGROUND LIGHT */

.bg-light{
    position:fixed;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#0077ff55,transparent 70%);
    top:-150px;
    left:-100px;
    filter:blur(60px);
    z-index:-1;
}



/* MAIN SECTION */

.coming-section{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}



/* BOX */

.coming-box{
    position:relative;
    width:100%;
    max-width:600px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:60px 40px;
    text-align:center;
    overflow:hidden;

    box-shadow:
    0 0 20px rgba(0,140,255,0.4),
    0 0 50px rgba(255,140,0,0.2);
}



/* PULSE CIRCLE */

.pulse-circle{
    width:120px;
    height:120px;
    background:linear-gradient(135deg,#008cff,#ff8800);
    border-radius:50%;
    margin:auto;
    margin-bottom:30px;
    animation:pulse 2s infinite;

    box-shadow:
    0 0 25px #008cff,
    0 0 50px #ff8800;
}



/* TEXT */

.coming-box h1{
    font-size:50px;
    margin-bottom:10px;
    letter-spacing:2px;

    text-shadow:
    0 0 10px #008cff,
    0 0 25px #008cff;
}

.coming-box h2{
    font-size:38px;
    color:#ff9900;
    margin-bottom:20px;

    text-shadow:
    0 0 10px #ff9900,
    0 0 25px #ff9900;
}

.coming-box p{
    color:#ddd;
    margin-bottom:35px;
    font-size:17px;
}



/* LOADING BAR */

.loading-bar{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.loading{
    width:40%;
    height:100%;
    background:linear-gradient(90deg,#008cff,#ff8800);
    border-radius:20px;
    animation:loading 2s infinite;
}



/* WAIT TEXT */

.coming-box span{
    font-size:16px;
    color:#bbb;
    letter-spacing:1px;
}



/* BOTTOM NAVIGATION */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:78px;

    background:#08111f;

    display:flex;
    justify-content:space-around;
    align-items:center;

    border-top:1px solid rgba(255,255,255,0.08);

    z-index:999999;
}



/* NAV ITEMS */

.nav-item{
    text-decoration:none;
    color:#ccc;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.nav-item span{
    font-size:24px;
    margin-bottom:4px;
}

.nav-item p{
    font-size:13px;
}

.nav-item:hover{
    color:#00aaff;
    transform:translateY(-5px);
}

.active{
    color:#ff9900;
}



/* ANIMATIONS */

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.12);
    }

    100%{
        transform:scale(1);
    }

}

@keyframes loading{

    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(300%);
    }

}



/* RESPONSIVE */

@media(max-width:600px){

    .coming-box{
        padding:45px 25px;
    }

    .coming-box h1{
        font-size:36px;
    }

    .coming-box h2{
        font-size:28px;
    }

    .pulse-circle{
        width:90px;
        height:90px;
    }

}

</style>

</head>

<body>



<!-- BACKGROUND LIGHT -->

<div class="bg-light"></div>



<!-- COMING SOON SECTION -->

<section class="coming-section">

    <div class="coming-box">

        <div class="pulse-circle"></div>

        <h1>RESULTS</h1>

        <h2>COMING SOON</h2>

        <p>
            PM SHRI GOVERNMENT HIGHER SECONDARY SCHOOL CHORAHATA
        </p>

        <div class="loading-bar">
            <div class="loading"></div>
        </div>

        <span>Please Wait...</span>

    </div>

</section>



<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

    <a href="index.html" class="nav-item">
        <span>🏠</span>
        <p>Home</p>
    </a>

    <a href="result.html" class="nav-item active">
        <span>📘</span>
        <p>Results</p>
    </a>

    <a href="notice.html" class="nav-item">
        <span>📢</span>
        <p>Notice</p>
    </a>

    <a href="achivements.html" class="nav-item">
        <span>🏆</span>
        <p>Achievements</p>
    </a>

</div>



</body>
</html>
