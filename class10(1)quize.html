<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000428,#004e92);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:95%;
  max-width:800px;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2,h3{text-align:center;}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
}

button{
  padding:12px 20px;
  background:#00c6ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  width:100%;
  margin-top:10px;
}

button:hover{background:#00a2d6;}

.option{
  padding:12px;
  margin:10px 0;
  background:rgba(255,255,255,0.15);
  border-radius:8px;
  cursor:pointer;
}

.option:hover{background:rgba(255,255,255,0.25);}

.correct{background:green !important;}
.wrong{background:red !important;}
.hidden{display:none;}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  font-size:18px;
  font-weight:bold;
}

#resultBox{text-align:center;}

</style>
</head>

<body>

<div class="box">

<!-- START BOX -->
<div id="startBox">

<h2>Student Details</h2>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="cls" placeholder="Enter Class">
<input type="text" id="roll" placeholder="Enter Roll No">

<button onclick="startQuiz()">Start Quiz</button>

</div>

<!-- QUIZ BOX -->
<div id="quizBox" class="hidden">

<div class="top">
<div>✔ Correct: <span id="correct">0</span></div>
<div>❌ Wrong: <span id="wrong">0</span></div>
<div>⏱ Time: <span id="time">30</span>s</div>
</div>

<h3 id="q"></h3>
<div id="options"></div>

<button onclick="nextQ()">Next Question</button>
</div>

<!-- RESULT BOX -->
<div id="resultBox" class="hidden"></div>

</div>

<script>

// ================= QUESTIONS =================
let qList = [
{q:"रासायनिक अभिक्रिया में क्या बनता है?",o:["तत्व","नए पदार्थ","गैस","जल"],a:1},
{q:"जंग लगना कौन सी अभिक्रिया है?",o:["संयोजन","ऑक्सीकरण","वियोजन","विस्थापन"],a:1},
{q:"Mg जलाने पर क्या बनता है?",o:["MgO","MgCl2","MgSO4","MgCO3"],a:0},
{q:"CuO का रंग क्या होता है?",o:["नीला","काला","हरा","सफेद"],a:1},
{q:"Fe + CuSO4 → ?",o:["FeSO4 + Cu","FeO","Cu","Fe2O3"],a:0},

{q:"रासायनिक समीकरण क्या दर्शाता है?",o:["केवल अभिकारक","केवल उत्पाद","अभिक्रिया का संक्षिप्त रूप","कोई नहीं"],a:2},
{q:"2Mg + O₂ → 2MgO किस प्रकार की अभिक्रिया है?",o:["संयोजन","वियोजन","विस्थापन","द्विविस्थापन"],a:0},
{q:"CaCO₃ → CaO + CO₂ किस प्रकार की अभिक्रिया है?",o:["संयोजन","वियोजन","विस्थापन","उपचयन"],a:1},
{q:"Zn + H₂SO₄ → ?",o:["ZnSO₄ + H₂","ZnO","H₂SO₄","ZnH₂"],a:0},
{q:"अभिक्रिया में प्रारंभिक पदार्थ क्या कहलाते हैं?",o:["उत्पाद","अभिकारक","मिश्रण","यौगिक"],a:1},

{q:"ऑक्सीकरण में क्या होता है?",o:["ऑक्सीजन जुड़ती है","ऑक्सीजन हटती है","हाइड्रोजन जुड़ता है","कुछ नहीं"],a:0},
{q:"अपचयन में क्या होता है?",o:["ऑक्सीजन जुड़ती है","ऑक्सीजन हटती है","गैस बनती है","जल बनता है"],a:1},
{q:"श्वसन किस प्रकार की अभिक्रिया है?",o:["ऊष्माक्षेपी","ऊष्माशोषी","वियोजन","संयोजन"],a:0},
{q:"ऊष्मा अवशोषित करने वाली अभिक्रिया कहलाती है?",o:["ऊष्माक्षेपी","ऊष्माशोषी","उपचयन","विस्थापन"],a:1},
{q:"CH₄ + O₂ → CO₂ + H₂O किसका उदाहरण है?",o:["दहन","वियोजन","संयोजन","उपचयन"],a:0},

{q:"AgCl सूर्य के प्रकाश में क्या बनाता है?",o:["Ag + Cl₂","AgO","AgNO₃","HCl"],a:0},
{q:"प्रकाशीय अपघटन का उदाहरण है?",o:["AgCl","MgO","NaCl","H₂O"],a:0},
{q:"विद्युत अपघटन में जल टूटकर क्या बनाता है?",o:["H₂ और O₂","CO₂","N₂","Cl₂"],a:0},
{q:"Fe₂O₃ का अपचयन करने पर क्या प्राप्त होता है?",o:["Fe","FeO","Fe₂O₃","FeSO₄"],a:0},
{q:"कॉपर पर हरी परत किस कारण बनती है?",o:["संक्षारण","दहन","उपचयन","वियोजन"],a:0},

{q:"संक्षारण का उदाहरण क्या है?",o:["लोहे पर जंग","जलना","गलना","उबलना"],a:0},
{q:"द्विविस्थापन अभिक्रिया में क्या होता है?",o:["आयनों का आदान-प्रदान","केवल ऑक्सीकरण","केवल अपचयन","कुछ नहीं"],a:0},
{q:"BaCl₂ + Na₂SO₄ → ?",o:["BaSO₄ + NaCl","BaSO₄ + 2NaCl","NaCl","BaCl₂"],a:1},
{q:"सफेद अवक्षेप किस अभिक्रिया में बनता है?",o:["BaSO₄","MgO","CO₂","H₂"],a:0},
{q:"रासायनिक अभिक्रिया का संकेत नहीं है?",o:["रंग परिवर्तन","गैस निकलना","ताप परिवर्तन","आकार बदलना"],a:3},

{q:"श्वसन में कौन सी गैस उपयोग होती है?",o:["O₂","CO₂","N₂","H₂"],a:0},
{q:"दहन के लिए आवश्यक गैस?",o:["O₂","CO₂","N₂","Cl₂"],a:0},
{q:"लोहे पर जंग बनने के लिए क्या आवश्यक है?",o:["हवा और नमी","केवल हवा","केवल नमी","धूप"],a:0},
{q:"संतुलित समीकरण में दोनों ओर क्या समान होता है?",o:["परमाणुओं की संख्या","रंग","ताप","दाब"],a:0},
{q:"रासायनिक अभिक्रिया का सबसे सामान्य संकेत क्या है?",o:["नए पदार्थ का बनना","रंग","गंध","स्वाद"],a:0},

{q:"रासायनिक अभिक्रिया में ऊर्जा का उत्सर्जन किसमें होता है?",o:["ऊष्माक्षेपी","ऊष्माशोषी","वियोजन","उपचयन"],a:0},
{q:"कौन सा पदार्थ ऑक्सीकरण करता है?",o:["ऑक्सीकारक","अपचायक","उत्पाद","अभिकारक"],a:0},
{q:"हाइड्रोजन का जुड़ना कहलाता है?",o:["अपचयन","ऑक्सीकरण","संक्षारण","दहन"],a:0},
{q:"कौन सा उदाहरण संयोजन अभिक्रिया का है?",o:["CaO + H₂O → Ca(OH)₂","CaCO₃ → CaO + CO₂","Zn + H₂SO₄","AgCl → Ag + Cl₂"],a:0},
{q:"कौन सा उदाहरण वियोजन अभिक्रिया का है?",o:["CaCO₃ → CaO + CO₂","Mg + O₂","Fe + CuSO₄","NaOH + HCl"],a:0},

{q:"NaOH + HCl → ?",o:["NaCl + H₂O","NaOH","HCl","Na₂O"],a:0},
{q:"न्यूट्रलाइजेशन में क्या बनता है?",o:["लवण और जल","केवल जल","केवल लवण","गैस"],a:0},
{q:"रासायनिक अभिक्रिया में गैस निकलना क्या दर्शाता है?",o:["अभिक्रिया हुई","कुछ नहीं","गलत प्रयोग","उबाल"],a:0},
{q:"लोहे की कील CuSO₄ में डालने पर क्या होता है?",o:["कॉपर जमता है","कुछ नहीं","कील घुल जाती है","जल बनता है"],a:0},
{q:"FeSO₄ विलयन का रंग क्या होता है?",o:["हरा","नीला","लाल","काला"],a:0},

{q:"कॉपर सल्फेट का रंग क्या है?",o:["नीला","हरा","पीला","काला"],a:0},
{q:"दहन अभिक्रिया में क्या निकलता है?",o:["ऊष्मा","बर्फ","नमी","नाइट्रोजन"],a:0},
{q:"अभिक्रिया के बाद बनने वाले पदार्थ कहलाते हैं?",o:["उत्पाद","अभिकारक","तत्व","मिश्रण"],a:0},
{q:"रासायनिक समीकरण को संतुलित क्यों किया जाता है?",o:["द्रव्यमान संरक्षण हेतु","रंग हेतु","गति हेतु","ताप हेतु"],a:0},
{q:"द्रव्यमान संरक्षण का नियम किसने दिया?",o:["लावोज़ियर","डाल्टन","रदरफोर्ड","बोर"],a:0},

{q:"किस अभिक्रिया में एक तत्व दूसरे को विस्थापित करता है?",o:["विस्थापन","संयोजन","वियोजन","उपचयन"],a:0},
{q:"AgCl का रंग क्या है?",o:["सफेद","हरा","काला","पीला"],a:0},
{q:"Pb(NO₃)₂ + KI में पीला अवक्षेप किसका बनता है?",o:["PbI₂","KI","KNO₃","PbO"],a:0},
{q:"रासायनिक अभिक्रिया में ताप परिवर्तन क्या दर्शाता है?",o:["अभिक्रिया हुई","कुछ नहीं","गलती","उबाल"],a:0},
{q:"कुल कितने प्रश्न हैं?",o:["50","45","40","55"],a:0}
];
// 50 QUESTIONS AUTO
while(qList.length < 50){
qList.push(qList[qList.length % 5]);
}

// ================= VARIABLES =================
let i=0;
let correct=0;
let wrong=0;
let lock=false;
let timer;
let time=30;

// ================= START QUIZ =================
function startQuiz(){

let n=document.getElementById("name").value;
let c=document.getElementById("cls").value;
let r=document.getElementById("roll").value;

if(!n || !c || !r){
alert("Please fill all details");
return;
}

document.getElementById("startBox").classList.add("hidden");
document.getElementById("quizBox").classList.remove("hidden");

loadQ();
startTimer();
}

// ================= TIMER =================
function startTimer(){

clearInterval(timer);
time=30;

document.getElementById("time").innerText=time;

timer=setInterval(()=>{

time--;
document.getElementById("time").innerText=time;

if(time<=0){
nextQ();
}

},1000);
}

// ================= LOAD QUESTION =================
function loadQ(){

lock=false;

let q=qList[i];

document.getElementById("q").innerText=(i+1)+". "+q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,idx)=>{

let div=document.createElement("div");
div.className="option";
div.innerText=opt;

div.onclick=()=>select(idx,div);

box.appendChild(div);

});

}

// ================= SELECT =================
function select(idx,el){

if(lock) return;
lock=true;

let q=qList[i];
let all=document.querySelectorAll(".option");

all.forEach((e,ii)=>{
if(ii==q.a){
e.classList.add("correct");
}
});

if(idx==q.a){
correct++;
document.getElementById("correct").innerText=correct;
}else{
wrong++;
document.getElementById("wrong").innerText=wrong;
el.classList.add("wrong");
}

}

// ================= NEXT =================
function nextQ(){

i++;

if(i>=50){
finish();
return;
}

loadQ();
startTimer();
}

// ================= SEND RESULT =================
function sendResult(){

fetch("https://script.google.com/macros/s/AKfycbyxbBm9WPio_QRR2vhyEmoAyGFF429UL70f2X_NiURJZmMvNxYA5ic57caKjUtx-Vu7/exec", {

method:"POST",

body: JSON.stringify({
name: document.getElementById("name").value,
cls: document.getElementById("cls").value,
roll: document.getElementById("roll").value,
correct: correct,
wrong: wrong,
score: correct+"/50",
time: new Date().toLocaleString()
})

});

}

// ================= FINISH =================
function finish(){

clearInterval(timer);

document.getElementById("quizBox").classList.add("hidden");
document.getElementById("resultBox").classList.remove("hidden");

document.getElementById("resultBox").innerHTML=`
<h2>Quiz Completed</h2>
<p><b>Name:</b> ${document.getElementById("name").value}</p>
<p><b>Class:</b> ${document.getElementById("cls").value}</p>
<p><b>Roll:</b> ${document.getElementById("roll").value}</p>
<hr>
<h3>✔ Correct: ${correct}</h3>
<h3>❌ Wrong: ${wrong}</h3>
<h2>🏆 Score: ${correct}/50</h2>
`;

sendResult();
}

</script>

</body>
</html>
