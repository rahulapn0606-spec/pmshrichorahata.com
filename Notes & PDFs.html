<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 10 Study Material</title>

<style>

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
    margin-top:30px;
}

.pdf-card{
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.pdf-card h3{
    margin-bottom:15px;
    font-size:18px;
}

.buttons{
    display:flex;
    gap:10px;
}

.buttons a{
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

.buttons a:first-child{
    background:#2196f3;
}

.buttons a:last-child{
    background:#4caf50;
}
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:linear-gradient(135deg,#000,#001f5c,#00b140);
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.container{
    max-width:1200px;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.pdf-card{
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:20px;
    color:white;
    text-align:center;
    border:1px solid rgba(255,255,255,.15);
}

.pdf-card h3{
    margin-bottom:20px;
    font-size:18px;
}

.buttons{
    display:flex;
    gap:10px;
    justify-content:center;
}

.buttons a{
    text-decoration:none;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    background:#0099ff;
    font-weight:bold;
    transition:.3s;
}

.buttons a:hover{
    transform:scale(1.05);
}

.buttons a:last-child{
    background:#00b140;
}
</style>
</head>
<body>

<h1>📚 Class 10 Study Material</h1>

<div class="container" id="pdfContainer"></div>

    <h3>${pdf.replace(".pdf","")}</h3>

  container.appendChild(card);
});
</script>
</body>
</html>
